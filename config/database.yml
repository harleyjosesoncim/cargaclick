# config/database.yml

default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>

development:
  <<: *default
  database: cargaclick_development
  # Opcional: configure username e password se precisar no ambiente local
  # username: your_local_db_user
  # password: your_local_db_password
  # host: localhost

test:
  <<: *default
  database: cargaclick_test

production:
  <<: *default
  # Em produção, use DATABASE_URL fornecida pelo Render/Fly.io/Heroku etc.
  url: <%= ENV["DATABASE_URL"] %>
