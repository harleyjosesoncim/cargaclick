databases:
  - name: cargaclick-db
    plan: free
    databaseName: cargaclick_production
    user: cargaclick

services:
  - type: web
    name: cargaclick
    runtime: docker              # usa o Dockerfile da raiz
    plan: starter
    dockerfilePath: ./Dockerfile
    autoDeploy: true
    healthCheckPath: /up

    buildCommand: "./bin/render-build.sh"

    # 🔑 releaseCommand = roda ANTES do serviço web subir
    releaseCommand: "bundle exec rails db:migrate"

    envVars:
      - key: RAILS_ENV
        value: production
      - key: RAILS_LOG_TO_STDOUT
        value: "true"
      - key: RAILS_SERVE_STATIC_FILES
        value: "true"
      - key: RAILS_MASTER_KEY
        sync: false   # você cola a master key no painel da Render
      - key: DATABASE_URL
        fromDatabase:
          name: cargaclick-db
          property: connectionString
